<div class="login-shell">
  <video
    class="login-bg-video"
    #bgVideo
    muted
    playsinline
    loop
    autoplay
    preload="auto"
  >
    <source src="assets/videos/google-deepmind-veo3.mp4" type="video/mp4" />
  </video>

  <div class="login-grid">
    <!-- Left column: tagline (desktop) -->
    <div class="login-tagline">
      <p class="login-app-text">
        <span class="linear-text">Create</span> at the speed <br />
        of <span class="linear-text">thought</span>
      </p>
    </div>

    <!-- Right column: sign-in card (always) -->
    <div class="login-card-wrap">
      <mat-card class="login-card">
        <mat-card-header class="!justify-center">
          <mat-card-title>
            <h1 class="mat-display-large mb-5">
              Creative <span class="linear-text">Studio</span>
            </h1>
          </mat-card-title>
        </mat-card-header>
        <mat-card-content class="flex flex-col items-center">
          <p class="register-text mb-4">
            Sign in with your corporate identity provider to continue.
          </p>
          <button
            mat-raised-button
            color="primary"
            (click)="loginWithSso()"
            class="login-btn"
          >
            Sign in with {{ idpDisplayName }}
          </button>
          <mat-spinner
            class="mt-5 m-auto"
            [diameter]="50"
            *ngIf="this.loader"
          ></mat-spinner>
        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
