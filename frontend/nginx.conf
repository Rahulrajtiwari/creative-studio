server {
  listen 8080;
  server_name _;

  # Hide nginx version in headers / 5xx pages.
  server_tokens off;
  absolute_redirect off;

  root  /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ---------------------------------------------------------------------------
  # Security headers
  # ---------------------------------------------------------------------------
  # HSTS is only sent over the corporate-PKI TLS terminated at the Internal
  # HTTPS Load Balancer, so this header is safe to enable inside the cluster.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=()" always;
  # Default-src 'self' lets the SPA load fonts/icons/images from the corp
  # mirror, plus the same-origin /api proxy for backend calls.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com https://*.googleusercontent.com; media-src 'self' blob: data: https://storage.googleapis.com; connect-src 'self' https://accounts.google.com https://*.googleapis.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

  # ---------------------------------------------------------------------------
  # Gzip
  # ---------------------------------------------------------------------------
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/xhtml+xml application/x-javascript image/svg+xml;

  # ---------------------------------------------------------------------------
  # Timeouts and body size
  # ---------------------------------------------------------------------------
  client_max_body_size 100M;
  client_body_timeout 60s;
  client_header_timeout 30s;
  send_timeout 60s;

  # ---------------------------------------------------------------------------
  # Health endpoints (consumed by the GKE Ingress backend health-check and
  # the Kubernetes readiness/liveness probes pointed at this container)
  # ---------------------------------------------------------------------------
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  location = /readyz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok";
  }

  # ---------------------------------------------------------------------------
  # API reverse proxy. The same Pod talks to cs-backend over its ClusterIP
  # service; users reach this Pod through the Internal HTTPS Load Balancer
  # so the browser sees same-origin /api calls.
  # ---------------------------------------------------------------------------
  location /api/ {
    proxy_pass         http://${BACKEND_SERVICE_HOST}:${BACKEND_SERVICE_PORT}/api/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   Connection        "";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_buffering    off;
    proxy_request_buffering off;
  }

  # Runtime config: do NOT cache so a redeploy (which rewrites this file via
  # envsubst) is picked up immediately on next refresh.
  location = /assets/runtime-config.json {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  # Long-cache hashed Angular assets.
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|webp|ico|mp4|webm|mov)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
