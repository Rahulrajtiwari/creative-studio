# =============================================================================
# Cloud Build pipeline — frontend image (Nginx + Angular)
# =============================================================================

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    env:
      - DOCKER_BUILDKIT=1
    args:
      - -ceu
      - |
        IMG="${_AR_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}"
        docker pull "$$IMG:${_CACHE_FROM}" || true
        docker build \
          --pull \
          --target runtime \
          --cache-from "$$IMG:${_CACHE_FROM}" \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --build-arg ANGULAR_BUILD_CONFIG=${_ANGULAR_BUILD_CONFIG} \
          -t "$$IMG:$SHORT_SHA" \
          -t "$$IMG:${_CACHE_FROM}" \
          -f frontend/Dockerfile \
          frontend

  - id: push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    waitFor: ["build"]
    args:
      - -ceu
      - |
        IMG="${_AR_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}"
        docker push "$$IMG:$SHORT_SHA"
        docker push "$$IMG:${_CACHE_FROM}"

  - id: scan
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    waitFor: ["push"]
    args:
      - -ceu
      - |
        IMG="${_AR_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:$SHORT_SHA"
        gcloud artifacts docker images describe "$$IMG" \
          --show-package-vulnerability \
          --format="value(image_summary.digest)"

  - id: resolve-digest
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    waitFor: ["scan"]
    args:
      - -ceu
      - |
        IMG="${_AR_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}"
        DIGEST=$(gcloud artifacts docker images describe "$$IMG:$SHORT_SHA" \
          --format='value(image_summary.digest)')
        printf '%s@%s\n' "$$IMG" "$$DIGEST" > /workspace/frontend-image-pinned.txt
        cat /workspace/frontend-image-pinned.txt

artifacts:
  objects:
    location: gs://${_BUILD_ARTIFACTS_BUCKET}/${_AR_REPO}/${_IMAGE_NAME}/${SHORT_SHA}/
    paths:
      - /workspace/frontend-image-pinned.txt

substitutions:
  _AR_REGION: us-central1
  _AR_REPO: platform
  _PROJECT_ID: ${PROJECT_ID}
  _IMAGE_NAME: creative-studio-frontend
  _CACHE_FROM: cache-main
  _ANGULAR_BUILD_CONFIG: production
  _BUILD_ARTIFACTS_BUCKET: ""

options:
  workerPool: projects/${_PROJECT_ID}/locations/${_AR_REGION}/workerPools/${_PRIVATE_POOL_NAME}
  logging: CLOUD_LOGGING_ONLY
  substitution_option: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  requestedVerifyOption: VERIFIED
  machineType: E2_HIGHCPU_8
  diskSizeGb: 100

timeout: 1800s

tags:
  - creative-studio
  - frontend
