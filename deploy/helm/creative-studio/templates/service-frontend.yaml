{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cs.frontend.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cs.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    {{- if .Values.frontend.backendConfig.enabled }}
    cloud.google.com/backend-config: '{"default": "{{ include "cs.frontend.fullname" . }}"}'
    {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  internalTrafficPolicy: Cluster
  selector:
    {{- include "cs.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - name: {{ .Values.frontend.service.portName }}
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
