{{- /*
  Optional in-cluster Secret used only when `externalSecrets.enabled` is false.
  Production deployments SHOULD use the ExternalSecret rendered by
  `templates/externalsecret.yaml`, which sources values from GCP Secret Manager
  via Workload Identity.
*/ -}}
{{- if and (not .Values.externalSecrets.enabled) .Values.externalSecrets.fallbackSecretData -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cs.backend.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cs.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
{{- range $k, $v := .Values.externalSecrets.fallbackSecretData }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
