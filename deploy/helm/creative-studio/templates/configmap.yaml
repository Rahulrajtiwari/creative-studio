apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cs.backend.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cs.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  # ---------------------------------------------------------------------------
  # Computed / aliased keys. These have to be listed explicitly because their
  # values either come from a helper template (project id, hostnames…) or
  # from a different .Values path (.Values.global.environment, not
  # .Values.backend.config.ENVIRONMENT).
  # ---------------------------------------------------------------------------
  PROJECT_ID: {{ include "cs.effective.projectId" . | quote }}
  LOCATION: {{ include "cs.effective.location" . | quote }}
  ENVIRONMENT: {{ .Values.global.environment | quote }}
  TRUSTED_HOSTS: {{ include "cs.effective.trustedHosts" . | quote }}
  FRONTEND_URL: {{ include "cs.effective.frontendUrl" . | quote }}
  # ---------------------------------------------------------------------------
  # Pass-through of every other key under `.Values.backend.config`. Anything
  # added to values{,-{env}}.yaml lands here automatically. This avoids the
  # silent-skip class of bugs where a new config key is added to values
  # files but never reaches the pod because the chart was never updated.
  #
  # Keys already set above are skipped so we don't double-emit them. We
  # also skip empty strings so optional fields fall back to the ConfigService
  # defaults rather than masking them with "".
  # ---------------------------------------------------------------------------
  {{- $explicit := list "PROJECT_ID" "LOCATION" "ENVIRONMENT" "TRUSTED_HOSTS" "FRONTEND_URL" }}
  {{- range $k, $v := .Values.backend.config }}
  {{- if and (not (has $k $explicit)) (ne (toString $v) "") }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cs.frontend.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cs.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  BACKEND_SERVICE_HOST: {{ include "cs.effective.backendHost" . | quote }}
  BACKEND_SERVICE_PORT: {{ .Values.frontend.config.BACKEND_SERVICE_PORT | quote }}
  OIDC_AUTHORITY: {{ .Values.frontend.config.OIDC_AUTHORITY | quote }}
  OIDC_CLIENT_ID: {{ .Values.frontend.config.OIDC_CLIENT_ID | quote }}
  OIDC_SCOPE: {{ .Values.frontend.config.OIDC_SCOPE | quote }}
  OIDC_AUDIENCE: {{ .Values.frontend.config.OIDC_AUDIENCE | quote }}
  OIDC_IDP_DISPLAY_NAME: {{ .Values.frontend.config.OIDC_IDP_DISPLAY_NAME | quote }}
  APP_HOST: {{ include "cs.effective.appHost" . | quote }}
