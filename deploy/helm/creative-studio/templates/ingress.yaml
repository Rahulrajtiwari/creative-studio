{{- if .Values.ingress.enabled }}
{{- $appHost := default (include "cs.effective.appHost" .) (index .Values.ingress.hosts 0).host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "cs.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cs.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- with .Values.ingress.staticIpName }}
    kubernetes.io/ingress.global-static-ip-name: {{ . | quote }}
    {{- end }}
    {{- with .Values.ingress.preSharedCertName }}
    ingress.gcp.kubernetes.io/pre-shared-cert: {{ . | quote }}
    {{- end }}
    {{- if .Values.ingress.frontendConfig.enabled }}
    networking.gke.io/v1beta1.FrontendConfig: {{ include "cs.fullname" . | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ default $appHost .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .serviceName "backend" }}
                name: {{ include "cs.backend.fullname" $ }}
                port:
                  number: {{ $.Values.backend.service.port }}
                {{- else if eq .serviceName "frontend" }}
                name: {{ include "cs.frontend.fullname" $ }}
                port:
                  number: {{ $.Values.frontend.service.port }}
                {{- else }}
                name: {{ .serviceName }}
                port:
                  number: 80
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
