# -----------------------------------------------------------------------------
# PRD overlay. Hand-tuned per-environment values that are *not* produced by
# Terraform (image tags, replica counts, resource limits, OIDC IdP details,
# topology spread constraints).
#
# Infrastructure-derived values (project ID, region, GSA emails, Cloud SQL
# instance connection name, DB user, ingress cert/IP, externalSecrets data
# mapping, Cloud SQL PSA CIDR, etc.) MUST come from the Terraform output:
#
#   cd infra/environments/prd
#   terraform output -json helm_values | jq '.' > /tmp/values-from-tf.json
#
#   helm upgrade --install creative-studio ../deploy/helm/creative-studio \
#     -n creative-studio --create-namespace \
#     -f /tmp/values-from-tf.json \
#     -f ../deploy/helm/creative-studio/values-prd.yaml
#
# Critically, do NOT set `backend.config.DB_USER` here — Terraform sets it
# to the IAM-auth user name derived from the GSA email, and overriding it
# breaks DB auth.
# -----------------------------------------------------------------------------
image:
  pullPolicy: IfNotPresent

backend:
  replicaCount: 6
  autoscaling:
    minReplicas: 6
    maxReplicas: 30
    targetCPUUtilizationPercentage: 65
  podDisruptionBudget:
    minAvailable: 4
  image:
    tag: "REPLACE_AT_DEPLOY"
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  config:
    OIDC_ISSUER: "https://login.example.com/idp"
    OIDC_AUDIENCES: "creative-studio"
    OIDC_ALLOWED_EMAIL_DOMAINS: "example.com"
    OIDC_ALLOWED_GROUPS: "creative-studio-users,creative-studio-admins"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: backend
          app.kubernetes.io/part-of: creative-studio

cloudSqlProxy:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

frontend:
  replicaCount: 4
  autoscaling:
    minReplicas: 4
    maxReplicas: 16
  podDisruptionBudget:
    minAvailable: 2
  image:
    tag: "REPLACE_AT_DEPLOY"
  config:
    OIDC_AUTHORITY: "https://login.example.com/idp"
    OIDC_CLIENT_ID: "creative-studio"
    OIDC_AUDIENCE: "creative-studio"
    OIDC_IDP_DISPLAY_NAME: "Corporate SSO"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: frontend
          app.kubernetes.io/part-of: creative-studio

migrations:
  image:
    tag: "REPLACE_AT_DEPLOY"
