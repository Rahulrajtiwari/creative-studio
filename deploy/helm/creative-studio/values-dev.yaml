# -----------------------------------------------------------------------------
# DEV overlay. Hand-tuned per-environment values that are *not* produced by
# Terraform (image tags, replica counts, OIDC IdP details).
#
# Infrastructure-derived values (project ID, region, GSA emails, Cloud SQL
# instance connection name, DB user, ingress cert/IP, externalSecrets data
# mapping, Cloud SQL PSA CIDR, etc.) MUST come from the Terraform output:
#
#   cd infra/environments/dev
#   terraform output -json helm_values | jq '.' > /tmp/values-from-tf.json
#
#   helm upgrade --install creative-studio ../deploy/helm/creative-studio \
#     -n creative-studio --create-namespace \
#     -f /tmp/values-from-tf.json \
#     -f ../deploy/helm/creative-studio/values-dev.yaml
#
# Helm merges later -f files on top of earlier ones, so this file should
# only override hand-tuned dev knobs and never duplicate Terraform-managed
# values (otherwise the two sources can drift). Critically, do NOT set
# `backend.config.DB_USER` here — Terraform sets it to the IAM-auth user
# name derived from the GSA email, and overriding it breaks DB auth.
# -----------------------------------------------------------------------------
backend:
  replicaCount: 2
  autoscaling:
    minReplicas: 2
    maxReplicas: 6
  image:
    tag: "creative-studio-backend@sha256:98fd3c19d3f579adaf3e42277f005a344d3ad695080858b68b0e19b1fd15cabe"
  config:
    DB_USER: "cs-be-dev@ravi-argolis-01.iam"
    TRUSTED_HOSTS: "*"
    # Vertex AI region for all generative-model calls (Gemini, Imagen,
    # Veo, Lyria). Override here because preview image models such as
    # `gemini-3.1-flash-image-preview` (Nano Banana 2) and
    # `gemini-3-pro-image-preview` are currently deployed only to
    # `us-central1`; calling them via `asia-south1` returns 404 NOT_FOUND.
    # Cloud SQL, GCS buckets, GKE nodes etc. continue to live in the
    # region from `global.region` (asia-south1) - only model RPCs are
    # cross-region. Once Google rolls these models out to asia-south1,
    # this override can be removed.
    LOCATION: "us-central1"
    OIDC_ISSUER: "https://accounts.google.com"
    OIDC_AUDIENCES: "791654394327-4qi2bkf4k2k7ikmb3n68gh3as7nise3u.apps.googleusercontent.com"
    # OIDC_CLIENT_ID is the public OAuth client ID. The matching secret
    # lives under externalSecrets.fallbackSecretData.OIDC_CLIENT_SECRET
    # (dev) or in GCP Secret Manager (production - see values.yaml).
    OIDC_CLIENT_ID: "791654394327-4qi2bkf4k2k7ikmb3n68gh3as7nise3u.apps.googleusercontent.com"
    # First user the bootstrap script will mark as the owner of the seeded
    # public workspace (and the owner of system-level VTO assets and media
    # templates). Must be an email of a real user who will sign in to the
    # app; if the user already exists in the DB the bootstrap just looks
    # them up - it does NOT auto-promote them to ADMIN role. Leave as the
    # default `"system"` to skip admin/public-workspace bootstrapping.
    ADMIN_USER_EMAIL: "user1@ravitiwary.altostrat.com"
    # SIGNING_SA_EMAIL is set by Terraform (platform-gke/outputs.tf) to the
    # backend GSA. Override here only if you need a dedicated signer SA
    # different from the backend's runtime SA.

# -----------------------------------------------------------------------------
# Backend secrets — sourced from GCP Secret Manager via External Secrets
# Operator. The ClusterSecretStore referenced below ("gcp-secret-manager")
# must already exist in the cluster and be authenticated to GCP Secret
# Manager via Workload Identity. The backend's GSA also needs
# `roles/secretmanager.secretAccessor` on the listed secrets.
#
# Each key in `data` becomes an env var on the backend pod; each value is
# the GCP Secret Manager secret name (NOT the full resource path - the
# project is supplied by the ClusterSecretStore).
# -----------------------------------------------------------------------------
externalSecrets:
  enabled: true
  refreshInterval: "1h"
  secretStoreRefName: "gcp-secret-manager"
  data:
    # OAuth client secret used by /api/auth/token (BFF token-exchange proxy).
    # The browser never receives this value.
    OIDC_CLIENT_SECRET: "agent_oauth_test_v1_791654394327"

frontend:
  replicaCount: 2
  autoscaling:
    minReplicas: 2
    maxReplicas: 4
  image:
    tag: "creative-studio-frontend@sha256:f467164bb1b82b9875eccf9f3c42eb79569d175ca2f1c8ad863457a5638b1894"
  config:
    OIDC_AUTHORITY: "https://accounts.google.com"
    OIDC_CLIENT_ID: "791654394327-4qi2bkf4k2k7ikmb3n68gh3as7nise3u.apps.googleusercontent.com"
    OIDC_AUDIENCE: "791654394327-4qi2bkf4k2k7ikmb3n68gh3as7nise3u.apps.googleusercontent.com"


migrations:
  # Bumped Job deadline to give bootstrap.py time to upload VTO assets and
  # media-template assets to GCS the first time (subsequent runs are fast
  # because every step is idempotent).
  activeDeadlineSeconds: 1800
  image:
    tag: "creative-studio-backend@sha256:98fd3c19d3f579adaf3e42277f005a344d3ad695080858b68b0e19b1fd15cabe"
  command:
    - "/bin/sh"
    - "-c"
  # Pipeline: 1) alembic migrations -> 2) bootstrap (admin user lookup,
  # public workspace, system VTO assets, media templates) -> 3) tell the
  # cloud-sql-proxy sidecar to quitquitquit so the Job pod can terminate.
  # All bootstrap steps are idempotent (existence checks before insert), so
  # this is safe to re-run on every helm upgrade.
  args:
    - "alembic upgrade head && python -m bootstrap.bootstrap && python3 -c \"import urllib.request; urllib.request.urlopen(urllib.request.Request('http://localhost:9091/quitquitquit', method='POST'))\""

networkPolicies:
  egress:
    extraAllowCidrs:
      - "0.0.0.0/0"